# 应用配置
spring.application.name=CampusMarket

# 数据库配置
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=295287;encrypt=false
spring.datasource.username=sa
spring.datasource.password=321416
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HikariCP连接池配置
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.pool-name=CampusMarketHikariCP
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# MyBatis Plus配置
mybatis-plus.mapper-locations=classpath:mapper/**/*.xml
mybatis-plus.type-aliases-package=org.example.campusmarket.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=isDeleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# 服务器配置
server.port=8080
server.servlet.context-path=/campus-market

# 日志配置
logging.level.org.example.campusmarket=info

# 文件上传配置
file.upload.path=./uploads
file.upload.banner-path=/banners
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
